<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>
    Janata Medical Stores - Order System
  </title>

  <!-- CSS -->

  <link rel="stylesheet" href="style.css">

  <link rel="stylesheet" href="print.css">

</head>

<body>

  <!-- HEADER -->

  <header>

    <h1>
      JANATA MEDICAL STORES
    </h1>

    <p>
      Ankush Chowk Sainath Nagar Nigdi
    </p>

  </header>

  <!-- MAIN CONTAINER -->

  <div class="container">

<!-- CREATE ORDER -->

<section class="card">

  <h2>Create Order</h2>

  <!-- DISTRIBUTOR SELECTION -->

  <div class="distributor-box">

    <label class="distributor-label">

      Select Distributor

    </label>

    <select id="distributorSelect">

      <option value="">
        Choose Distributor
      </option>

      <option value="Apollo">
        Apollo
      </option>

      <option value="Cipla">
        Cipla
      </option>

      <option value="Sun Pharma">
        Sun Pharma
      </option>

      <option value="MedPlus">
        MedPlus
      </option>

      <option value="Wellness Forever">
        Wellness Forever
      </option>

    </select>

  </div>

  <!-- SEARCH BOX -->

  <input
    type="text"
    id="medicineSearch"
    placeholder="Search Medicine..."
    autocomplete="off"
  >

  <!-- SEARCH RESULTS -->

  <div id="searchResults"
       class="search-results">
  </div>

  <!-- SELECTED MEDICINES -->

  <div class="selected-box">

    <div class="selected-header">

      <h3>
        Selected Medicines
      </h3>

      <span id="medicineCount">
        0 Medicines
      </span>

    </div>

    <div id="selectedMedicines"
         class="selected-container">
    </div>

  </div>

  <!-- CONFIRM BUTTON -->

  <button onclick="confirmOrder()">
    + Confirm Order
  </button>

</section>

    <!-- ORDERS -->

    <section class="card">

      <h2>Orders</h2>

      <div id="ordersContainer"></div>

      <button onclick="printOrders()">
        Print Orders
      </button>

    </section>

  </div>

  <!-- PRINT AREA -->

  <div id="printArea"
       class="print-page">
  </div>

  <!-- JS -->

  <script type="module"
          src="firebase.js">
  </script>

  <script type="module"
          src="app.js">
  </script>

</body>

</html>
